name: TypeScript Playwright Tests + Quality Gates

on:
  push:
    branches: [main]
    paths: ['playwright-typescript/**']
  pull_request:
    branches: [main]
    paths: ['playwright-typescript/**']
  workflow_dispatch:

defaults:
  run:
    working-directory: playwright-typescript

jobs:

  # ── Security Scan — Trivy ──────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

  # ── Code Quality — SonarCloud ──────────────────────────────────────────────
  code-quality:
    name: Code Quality (SonarCloud)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarCloud blame data

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Playwright TypeScript ──────────────────────────────────────────────────
  test-typescript:
    name: Run Tests (TypeScript)
    runs-on: ubuntu-latest
    needs: [security-scan, code-quality]  # Only run if quality gates pass
    environment: develop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: playwright-typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.saucedemo.com' }}
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: typescript-test-report
          path: playwright-typescript/playwright-report/
          retention-days: 7
