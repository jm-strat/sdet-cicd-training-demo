name: 01 - Demo Workflow Anatomy

# ─────────────────────────────────────────
# TRIGGERS
# ─────────────────────────────────────────
on:
  push:
    branches: [main]
    paths: ['src/**']
  pull_request:
    branches: [main]
    paths: ['src/**']
  workflow_dispatch:               # allows manual trigger from GitHub UI

# ─────────────────────────────────────────
# WORKFLOW-LEVEL ENV VARS
# available to all jobs and steps
# ─────────────────────────────────────────
env:
  WORKFLOW_VAR: "i am available to all jobs and steps"

# ─────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────
jobs:

  # ── JOB 1 ───────────────────────────────
  explore-structure:
    runs-on: ubuntu-latest

    # job-level env var
    env:
      JOB_VAR: "i am available to all steps in this job"

    steps:
      # basic step with just run
      - name: Print workflow-level env var
        run: echo "Workflow var -> ${{ env.WORKFLOW_VAR }}"

      # basic step with job-level env var
      - name: Print job-level env var
        run: echo "Job var -> ${{ env.JOB_VAR }}"

      # step-level env var
      - name: Print step-level env var
        env:
          STEP_VAR: "i am only available to this step"
        run: echo "Step var -> ${{ env.STEP_VAR }}"

      # github context variables
      - name: Print github context variables
        run: |
          echo "Actor      -> ${{ github.actor }}"
          echo "Event      -> ${{ github.event_name }}"
          echo "Ref        -> ${{ github.ref }}"
          echo "Ref name   -> ${{ github.ref_name }}"
          echo "SHA        -> ${{ github.sha }}"
          echo "Repository -> ${{ github.repository }}"

  # ── JOB 2 ───────────────────────────────
  explore-step-conditions:
    runs-on: ubuntu-latest

    steps:
      # always() — runs regardless of previous step outcome
      - name: This step will fail
        id: failing-step
        run: exit 1                          # force a failure

      - name: Runs only on success
        if: success()
        run: echo "Previous step succeeded"  # will be skipped

      - name: Runs only on failure
        if: failure()
        run: echo "Previous step failed"     # will run

      - name: Always runs
        if: always()
        run: echo "I always run no matter what"

      # checking a specific step outcome
      - name: Check specific step outcome
        if: steps.failing-step.outcome == 'failure'
        run: echo "Confirmed -> failing-step outcome was failure"

  # ── JOB 3 ───────────────────────────────
  explore-outputs:
    runs-on: ubuntu-latest

    # expose a step output as a job output
    outputs:
      generated-value: ${{ steps.generate.outputs.value }}

    steps:
      - name: Generate a value
        id: generate
        run: echo "value=hello-from-job-output" >> $GITHUB_OUTPUT

      - name: Print the value within same job
        run: echo "Value in same job -> ${{ steps.generate.outputs.value }}"

  # ── JOB 4 ───────────────────────────────
  consume-outputs:
    runs-on: ubuntu-latest
    needs: explore-outputs           # must wait for explore-outputs to finish

    steps:
      - name: Print value from upstream job
        run: echo "Value from upstream job -> ${{ needs.explore-outputs.outputs.generated-value }}"

      # checking upstream job result
      - name: Check upstream job result
        run: echo "explore-outputs result -> ${{ needs.explore-outputs.result }}"

  # ── JOB 5 ───────────────────────────────
  explore-job-conditions:
    runs-on: ubuntu-latest
    needs: explore-outputs
    if: needs.explore-outputs.result == 'success'   # only run if upstream job passed

    steps:
      - name: Print condition outcome
        run: echo "explore-outputs passed so this job ran"
